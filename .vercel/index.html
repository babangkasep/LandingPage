<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Plat Nomor Custom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <h1>Plat Nomor Custom Kendaraan</h1>
  <p>Bisa desain sesuai keinginanmu</p>
  <button onclick="orderNow()">Pesan via WhatsApp</button>
</section>

<section class="form">
  <h2>Custom Plat Kamu</h2>

  <label>Nomor Plat:</label>
  <input type="text" id="plate" placeholder="B 1234 ABC">

  <label>Warna:</label>
  <select id="color">
    <option>Hitam</option>
    <option>Putih</option>
    <option>Kuning</option>
  </select>

  <label>Wilayah:</label>
  <select id="region">
    <option>Jakarta</option>
    <option>Bandung</option>
    <option>Surabaya</option>
  </select>

  <h3>Tambahan</h3>
  <label><input type="checkbox" id="frame"> Frame (+15000)</label>
  <label><input type="checkbox" id="antiAir"> Anti Air (+10000)</label>

  <h2>Total: Rp <span id="total">100000</span></h2>

  <button onclick="orderNow()">Pesan Sekarang</button>
</section>

<script src="script.js"></script>
</body>
</html>
